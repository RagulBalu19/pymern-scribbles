<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter Project</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>
<body>
    
    <section>
        <div class="2xl:container mx-auto bg-blue-200">
            <div class="w-[90%] mx-auto">
                <div class="flex flex-col justify-center items-center h-screen gap-5">
                    <div>
                        <h1 class="text-center font-[800] text-[32px]">Counter</h1>
                        <p class="text-center font-[800] text-[32px] " id="number">0</p>
                    </div>
                    <div class="flex gap-5">
                        <button class="py-2 px-3  border border-black rounded-2xl" id="btn-">Decrease</button>
                        <button class="py-2 px-3  border border-black rounded-2xl" id="btn0">Reset</button>
                        <button class="py-2 px-3  border border-black rounded-2xl" id="btn+">Increase</button> 
                    </div>
                </div>
            </div>
        </div>
    </section>
    
<!-- Script -->
<script>
    var n1 = document.getElementById("number");
    var b1 =document.getElementById("btn-");
    var b2 =document.getElementById("btn0");
    var b3 =document.getElementById("btn+");
    
    function colo(){
        var val = parseInt(n1.textContent);
        if( val < 0){
            n1.style.color ="red";
        }
        else if( val > 0){
            n1.style.color = "green";
        }
        else{
            n1.style.color ="black";
        }
    }
    b3.addEventListener("click",()=>{
        console.dir(n1);
        n1.textContent = parseInt(n1.textContent) + 1;
        colo();
    });
    b1.addEventListener("click", ()=>{
        n1.textContent = parseInt(n1.textContent) - 1;
        colo()
    });
    b2.addEventListener("click", ()=>{
        n1.textContent = 0;
        colo();
    });
    
</script>
        
</body>
</html>
