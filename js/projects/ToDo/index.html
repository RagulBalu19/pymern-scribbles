<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo Application</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body{
            background: linear-gradient(135deg,#4F46E5,#7C3AED,#EC4899);
            min-height:100vh;
        }

        .glass{
            backdrop-filter: blur(15px);
            background: rgba(255,255,255,.15);
            border:1px solid rgba(255,255,255,.25);
        }

        .completed{
            text-decoration: line-through;
            opacity:.6;
        }

        ::-webkit-scrollbar{
            width:8px;
        }

        ::-webkit-scrollbar-thumb{
            background:#6366F1;
            border-radius:20px;
        }
    </style>
</head>

<body>

<div class="container mx-auto px-5">

    <div class="flex justify-center items-center min-h-screen">

        <div class="glass w-full max-w-xl rounded-3xl shadow-2xl p-8">

            <!-- Heading -->

            <div class="text-center mb-8">

                <h1 class="text-5xl font-extrabold text-white">
                    📝 To-Do List
                </h1>

                <p class="text-white/80 mt-3">
                    Stay organized. Stay productive.
                </p>

            </div>

            <!-- Form -->

            <form id="form" class="space-y-3">

                <div class="flex flex-col sm:flex-row gap-3">

                    <input
                        type="text"
                        id="task"
                        placeholder="Enter your task..."
                        class="flex-1 rounded-xl p-4 outline-none text-lg shadow-md focus:ring-4 focus:ring-indigo-300">

                    <button
                        type="button"
                        id="addbtn"
                        class="bg-indigo-600 hover:bg-indigo-700 active:scale-95 transition-all duration-300 text-white font-bold px-8 rounded-xl shadow-lg">
                        ➕ Add
                    </button>

                </div>

                <p id="errmsg" class="text-red-200 font-semibold"></p>

            </form>

            <!-- Task List -->

            <div
                class="bg-white rounded-2xl shadow-xl mt-8 p-5 max-h-[400px] overflow-y-auto">

                <h2 class="text-2xl font-bold text-gray-700 mb-4">
                    Your Tasks
                </h2>

                <ul
                    id="taskList"
                    class="space-y-4">

                </ul>

                <div id="emptyMessage" class="text-center text-gray-400 py-10">

                    📭 No tasks added yet

                </div>

            </div>

        </div>

    </div>

</div>

<script src="../ToDo/Scrpit.js"></script>

</body>
</html>
